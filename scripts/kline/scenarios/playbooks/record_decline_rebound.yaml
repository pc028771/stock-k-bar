# B07: 創紀錄跌點之後不再破底 (entry)
# Source: INVENTORY B07 §30 / 77DC434EC71DB04553752A44C9354680
#
# required_context notes:
#   [STUB-NEED-USER] S4: 「創紀錄跌點」定義 — 全市場歷史 max？近 5 年 max？老師未明示
#     → 此 playbook 仍可寫；required_context 標出依賴
#     → 觸發條件以人工或外部訊號確認「今日創紀錄跌點」，再走此劇本
#   is_anomalous_volume — [STUB-NEED-USER] S1: 老師提到市場恐慌放量，proxy 用 is_anomalous_volume
#
# 適用：價值投資 / 短線抄底；對應「打擊區哲學」— 創紀錄跌點只出現幾次，打到就大
# 注意：排除「本質非常爛的公司」（基本面 filter — 課程外，不實作，advisor 在 notes warn）

pattern: record_decline_rebound

setup:
  name: record_decline_no_new_low_entry
  required_context:
    - is_anomalous_volume

course_sources:
  - source: "明日 K 線 §30 創紀錄跌點之後不再破底"
    article_id: "77DC434EC71DB04553752A44C9354680"
    quote: "大盤（或個股）出現創紀錄跌點，隔日不再創新低，這是抄底時機"
  - source: "MEMORY project_zhuli_hitting_zone_philosophy"
    quote: "平常小錢耕耘、打擊區出現大口吃肉；創紀錄跌點只出現幾次，打到就大"

branches:
  # B1 — 隔日未破底（主要進場訊號）
  - id: B1_next_day_no_new_low
    when:
      "next_day.low": "> today.low"
    confirm_at: next_close
    next_day_n: 1
    action:
      type: entry_signal
      description: "創紀錄跌點隔日最低未再破底（today.low 守住），抄底進場訊號成立"
      course_citation:
        source: "明日 K 線 §30 創紀錄跌點後不破底進場"
        article_id: "77DC434EC71DB04553752A44C9354680"
        quote: "隔日不再創新低（隔日 low > 前日 low）→ 排除爛公司後可進場"
      notes:
        - "[STUB-NEED-USER] S4: 「創紀錄跌點」定義（全市場歷史 max / 近 5 年 max）老師未明示，目前需人工確認觸發"
        - "基本面 filter（排除本質爛的公司）屬課程外條件，無法在此 playbook 實作；請人工確認"
        - "此訊號對應「打擊區哲學」— 大機率機會，確認後可大口進場"
    next_branch_ids: ["B3_hold_watch"]

  # B2 — 隔日再度破底（訊號失效）
  - id: B2_next_day_new_low
    when:
      "next_day.low": "<= today.low"
    confirm_at: next_close
    next_day_n: 1
    action:
      type: exhaust_invalid
      description: "創紀錄跌點隔日仍再創新低，反彈訊號失效；不進場或已進場者停損"
      course_citation:
        source: "明日 K 線 §30 創紀錄跌點失效條件"
        article_id: "77DC434EC71DB04553752A44C9354680"
        quote: "隔日再創新低 → 不再破底條件不成立，訊號無效"
      notes:
        - "停損邏輯：結構底跌破（收盤確認），依課程框架出清"
    next_branch_ids: []

  # B3 — 進場後持有觀察（B1 後繼）
  - id: B3_hold_watch
    when:
      "next_day.close": "> today.low"
    confirm_at: next_close
    next_day_n: 2
    action:
      type: watch_only
      description: "進場後第二日仍守在創紀錄跌點之上，持有觀察；等待反彈結構形成"
      course_citation:
        source: "明日 K 線 §30 創紀錄跌點後持有邏輯"
        article_id: "77DC434EC71DB04553752A44C9354680"
        quote: "創紀錄跌點不再破底後，等待反彈"
      notes:
        - "停損條件：收盤跌破進場日最低（結構支撐跌破，CLAUDE.md 課程框架 §2）"
    next_branch_ids: []

relevant_lights: []
