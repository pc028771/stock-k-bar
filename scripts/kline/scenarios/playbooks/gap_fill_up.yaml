pattern: gap_fill_up
setup:
  name: context_only_upward_gap_filled
  required_context: []
course_sources:
  - source: "PATTERN_INVENTORY P27 上缺口被回補 gap_fill_pattern"
    article_id: "5CB9CD820B2BEF0AC861FFEDB89CD6B0"
    quote: "向上缺口被回補（多方力量消失）；攻擊跳空被回補意義更大"
  - source: "PATTERN_DEFINITIONS §3 缺口回補型態"
    quote: "Signal Class: context_only；N通常≤5（短期內回補才有意義）"

branches:
  - id: B1_next_day_continues_lower_after_fill
    when:
      "next_day.close": "< today.low"
    confirm_at: next_close
    next_day_n: 1
    action:
      type: context_only_signal
      description: "向上跳空缺口回補後隔日繼續下跌，多方攻擊力量消失確認"
      course_citation:
        source: "PATTERN_INVENTORY P27 向上缺口被回補"
        article_id: "5CB9CD820B2BEF0AC861FFEDB89CD6B0"
        quote: "向上缺口被回補（多方力量消失）；攻擊跳空被回補意義更大"
      notes: []
    next_branch_ids: []

  - id: B2_next_day_recovers
    when:
      "next_day.close": "> today.high"
    confirm_at: next_close
    next_day_n: 1
    action:
      type: exhaust_invalid
      description: "回補缺口後隔日又重新站上，缺口回補訊號失效，多方攻擊意義可能恢復"
      course_citation:
        source: "PATTERN_INVENTORY P27 缺口回補型態"
        article_id: "5CB9CD820B2BEF0AC861FFEDB89CD6B0"
        quote: "N通常≤5（短期內回補才有意義）；後續站回則失效"
      notes: []
    next_branch_ids: []

relevant_lights: []
